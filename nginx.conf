# ============================================
# Nginx 配置文件 - Vue3 SPA 应用
# 域名: muyirunner.icu
# 用途: 个人简历网站
# ============================================

server {
    # 监听 80 端口（HTTP）
    listen 80;
    listen [::]:80;

    # 服务器域名
    server_name muyirunner.icu www.muyirunner.icu;

    # HTTP 自动重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    # 监听 443 端口（HTTPS）
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # 服务器域名
    server_name muyirunner.icu www.muyirunner.icu;

    # ========== SSL 证书配置（需要修改为实际路径） ==========
    # 如果使用 Let's Encrypt，证书路径通常是：
    ssl_certificate /etc/letsencrypt/live/muyirunner.icu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/muyirunner.icu/privkey.pem;

    # SSL 配置优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ========== 网站根目录 ==========
    root /var/www/html;
    index index.html;

    # ========== 字符集 ==========
    charset utf-8;

    # ========== 日志配置 ==========
    access_log /var/log/nginx/muyirunner.icu_access.log;
    error_log /var/log/nginx/muyirunner.icu_error.log warn;

    # ========== Gzip 压缩 ==========
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # ========== 安全头部 ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ========== 主要路由配置（SPA 核心） ==========
    location / {
        # 尝试访问文件，如果不存在则回退到 index.html
        # 这是 Vue Router（history 模式）的关键配置
        try_files $uri $uri/ /index.html;
    }

    # ========== 静态资源缓存策略 ==========
    # JS/CSS 文件（带 hash 值）- 长期缓存
    location ~* \.(?:css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 图片/字体文件 - 长期缓存
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # PDF 文件（简历）- 中期缓存
    location ~* \.pdf$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header Content-Disposition "inline";
    }

    # HTML 文件 - 不缓存（确保更新及时）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ========== robots.txt 和 sitemap.xml ==========
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    location = /sitemap.xml {
        log_not_found off;
        access_log off;
    }

    # ========== 隐藏敏感文件 ==========
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========== favicon ==========
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # ========== 404 处理（SPA 应该不会触发，因为有 try_files） ==========
    error_page 404 /index.html;

    # ========== 50x 错误页面 ==========
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
